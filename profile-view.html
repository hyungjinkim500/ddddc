<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽스 | 프로필</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        html.dark body { background-color: #0f172a; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8f7f4; display: flex; flex-direction: column; }
        html.dark #app { background: #1e293b; }
        #top-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        html.dark #top-header { background: #1e293b; border-color: #334155; }
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        #bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 50; }
        html.dark #bottom-nav { background: #1e293b; border-color: #334155; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; font-size: 10px; color: #94a3b8; cursor: pointer; text-decoration: none; gap: 3px; }
        .nav-btn.active { color: #169976; }
        .nav-btn i { font-size: 20px; }
        .nav-btn.pick-btn .pick-circle { width: 48px; height: 48px; background: #169976; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; box-shadow: 0 4px 12px rgba(22,153,118,0.4); }
        .nav-btn.pick-btn .pick-circle i { font-size: 22px; color: white; }
    </style>
</head>
<body>
<div id="app">

    <header id="top-header">
        <div class="flex items-center justify-between px-4 py-3">
            <button onclick="history.back()" class="text-slate-500 dark:text-slate-400 hover:text-slate-700 transition">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <span class="font-bold text-slate-800 dark:text-white text-base">프로필</span>
            <div class="w-8"></div>
        </div>
    </header>

    <main id="content-area">
        <!-- 프로필 카드 -->
        <div class="bg-white dark:bg-slate-800 px-4 py-5 flex items-center gap-4">
            <div class="flex-shrink-0">
                <img id="profile-image" class="w-16 h-16 rounded-full object-cover border-2 border-slate-200 dark:border-slate-600" onerror="this.style.display='none'">
            </div>
            <div class="flex-1">
                <p id="profile-name" class="font-bold text-lg text-slate-900 dark:text-white">-</p>
            </div>
        </div>

        <!-- 게시글 목록 -->
        <div class="px-4 py-4">
            <p class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">게시글</p>
            <div id="posts-container" class="space-y-2"></div>
        </div>
    </main>

</div>

<script src="nav.js"></script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="profile-view.js"></script>
</body>
</html>
