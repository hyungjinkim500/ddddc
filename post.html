<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>집단지성 플랫폼 픽스 | 게시물</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        html.dark body { background-color: #0f172a; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8f7f4; display: flex; flex-direction: column; }
        html.dark #app { background: #1e293b; }
        #top-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        html.dark #top-header { background: #1e293b; border-color: #334155; }
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        #bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 50; }
        html.dark #bottom-nav { background: #1e293b; border-color: #334155; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; font-size: 10px; color: #94a3b8; cursor: pointer; text-decoration: none; gap: 3px; }
        .nav-btn.active { color: #263559; }
        .nav-btn i { font-size: 20px; }
        .nav-btn.pick-btn .pick-circle { width: 48px; height: 48px; background: #3ef0cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; box-shadow: 0 4px 12px rgba(22,153,118,0.4); }
        .nav-btn.pick-btn .pick-circle i { font-size: 22px; color: white; }
        /* 로그인 모달은 auth.js에서 동적 주입 */
    </style>
</head>
<body>
<div id="app">

    <header id="top-header">
        <div class="flex items-center justify-between px-4 py-3">
            <button onclick="history.back()" class="text-slate-500 dark:text-slate-400 hover:text-slate-700 transition">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <span class="font-bold text-slate-800 dark:text-white text-sm">게시물</span>
            <div class="flex items-center gap-2">
                <button id="header-login-btn" class="text-sm font-bold px-3 py-1.5 rounded-lg bg-[#3ef0cc] text-#263559 cursor-pointer hidden">
                    로그인
                </button>
                <div id="header-user-area" class="hidden items-center">
                </div>
                <!-- 더보기 버튼 (본인 게시글일 때만 표시) -->
                <div class="relative">
                    <button id="post-more-btn" class="hidden text-slate-500 dark:text-slate-400 hover:text-slate-700 transition px-1 py-1">
                        <i class="fas fa-ellipsis-v text-lg"></i>
                    </button>
                    <div id="post-more-menu" class="hidden absolute right-0 top-8 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl shadow-lg z-50 w-32 overflow-hidden">
                        <button id="post-edit-btn" class="flex items-center gap-2 w-full px-4 py-3 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-600">
                            <i class="fas fa-pen text-slate-400 text-xs"></i> 수정
                        </button>
                        <button id="post-delete-btn" class="flex items-center gap-2 w-full px-4 py-3 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">
                            <i class="fas fa-trash text-red-400 text-xs"></i> 삭제
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="content-area">
        <div id="detail-container" class="bg-white dark:bg-slate-800 px-4 py-4 space-y-4">

            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-600 overflow-hidden flex-shrink-0">
                        <img id="detail-author-avatar" onerror="this.style.display='none'" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <span id="detail-author" class="text-sm font-semibold text-slate-800 dark:text-white"></span>
                        <span id="detail-created-at" class="text-xs text-slate-400 ml-2"></span>
                    </div>
                </div>
                <div class="flex items-center gap-2 text-xs text-slate-400">
                    <span id="detail-view-count"></span>
                    <span id="detail-comment-count-meta"></span>
                </div>
            </div>

            <!-- 카테고리 hidden -->
            <h1 id="detail-title" class="text-xl font-bold text-slate-900 dark:text-white leading-snug"></h1>
            <p id="detail-description" class="text-slate-600 dark:text-slate-300 text-sm leading-relaxed break-words"></p>
            <div id="detail-images" class="space-y-2"></div>

            <!-- PIX 투표 영역 -->
            <div id="detail-vote-area" class="hidden space-y-2">
                <div class="relative h-5 rounded-lg overflow-hidden flex" style="background:#e2e8f0;">
                    <div id="vote-bar-a" class="h-full flex items-center justify-start pl-2 font-bold text-slate-700 text-xs transition-all duration-500"
                        style="width:50%; background:rgba(22,153,118,0.3); min-width:20px;">50%</div>
                    <div id="vote-bar-b" class="h-full flex items-center justify-end pr-2 font-bold text-slate-700 text-xs transition-all duration-500 flex-1"
                        style="background:rgba(249,115,22,0.3);">50%</div>
                </div>
                <div id="detail-participation" class="hidden space-y-1">
                    <div class="w-full bg-slate-200 rounded h-1.5">
                        <div id="participation-bar" class="bg-[#169976] h-1.5 rounded w-0 transition-all"></div>
                    </div>
                    <div id="participation-text" class="text-xs text-slate-400"></div>
                </div>
                <div id="detail-options" class="grid grid-cols-2 gap-2"></div>
            </div>

            <!-- 비PIX 결과바 -->
            <div id="detail-results" class="space-y-3"></div>

            <div class="flex items-center gap-4 pt-3 border-t border-slate-200 dark:border-slate-700">
                <button id="detail-like-button" class="flex items-center gap-1.5 text-slate-400 hover:text-red-500 transition">
                    <i class="far fa-heart text-lg"></i>
                    <span id="detail-like-count" class="text-sm">0</span>
                </button>
                <span id="detail-vote-stat" class="hidden flex items-center gap-1 text-slate-400 text-sm">
                    <i class="fas fa-poll text-base"></i>
                    <span></span>
                </span>
                <button id="detail-share-button" class="flex items-center gap-1.5 text-slate-400 hover:text-slate-600 transition ml-auto">
                    <i class="fas fa-share-alt text-lg"></i>
                </button>
            </div>
        </div>

        <div id="comments-section" class="bg-white dark:bg-slate-800 mt-2 px-4 py-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold text-slate-800 dark:text-white">댓글 <span id="detail-comment-count" class="text-[#169976]"></span></h3>
                <select id="comment-sort" class="text-xs border border-slate-200 dark:border-slate-600 rounded-lg px-2 py-1 bg-white dark:bg-slate-700 text-slate-500 dark:text-slate-300 outline-none">
                    <option value="latest">최신순</option>
                    <option value="oldest">과거순</option>
                    <option value="top">순공감순</option>
                </select>
            </div>
            <div class="flex gap-2 mb-2">
                <input id="comment-input" type="text" placeholder="댓글을 입력하세요"
                    class="flex-1 border rounded-lg px-3 py-2 text-sm dark:bg-slate-700 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-[#169976]"/>
                <button id="comment-submit" class="bg-[#3ef0cc] text-#263559 px-4 py-2 rounded-lg text-sm font-bold">작성</button>
            </div>
            <div id="comment-length" class="text-xs text-slate-400 mb-3 text-right">0 / 200</div>
            <div id="comment-list" class="space-y-3"></div>
        </div>
    </main>

</div>

<!-- 로그인 모달은 auth.js에서 동적 주입 -->

<div id="image-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
    <button id="image-modal-close" class="absolute top-5 right-6 text-white text-3xl font-bold">×</button>
    <button id="image-prev" class="absolute left-6 text-white text-4xl font-bold">‹</button>
    <img class="max-h-[90vh] max-w-[90vw] rounded-lg shadow-xl"/>
    <button id="image-next" class="absolute right-6 text-white text-4xl font-bold">›</button>
    <div id="image-counter" class="absolute bottom-6 text-white text-sm"></div>
</div>

<script src="nav.js"></script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="comments.js"></script>
<script type="module" src="post.js"></script>
</body>
</html>
