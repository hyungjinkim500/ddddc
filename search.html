<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
(function() {
    var q = new URLSearchParams(window.location.search).get('q');
    if (q) {
        window.location.replace('explore.html?q=' + encodeURIComponent(q));
    } else {
        window.location.replace('explore.html');
    }
})();
</script>
</head>
<body></body>
</html>
