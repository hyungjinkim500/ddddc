<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과 | 픽스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap');
        
        :root {
            --pm-navy: #0e1117;
            --pm-teal: #00d395; 
            --pm-teal-dark: #00a876;
            --bg-primary-light: #f1f5f9;
            --bg-primary-dark: #020617;
            --text-primary-light: #1e293b;
            --text-primary-dark: #e2e8f0;
            --card-bg-light: white;
            --card-bg-dark: #0f172a;
            --border-light: #e2e8f0;
            --border-dark: #1e293b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.025em;
            word-break: keep-all;
            background-color: var(--bg-primary-light);
            color: var(--text-primary-light);
        }
        html.dark body {
            background-color: var(--bg-primary-dark);
            color: var(--text-primary-dark);
        }
    </style>
</head>
<body class="transition-colors duration-300">

<div id="header-container"></div>

    <main class="container mx-auto px-4 sm:px-6 py-8 md:py-12">
        <h2 class="text-2xl font-bold mb-6">
            '<span id="search-keyword"></span>'에 대한 검색 결과
        </h2>
        <div id="search-results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Search results will be loaded here -->
        </div>
    </main>
    
    <script type="module" src="quiz-main.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
        import { createQuizCard } from './quiz-main.js';

        const params = new URLSearchParams(window.location.search);
        const keyword = params.get('q');
        
        const searchKeywordEl = document.getElementById('search-keyword');
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results-container');

        if (keyword) {
            searchKeywordEl.textContent = keyword;
            searchInput.value = keyword;
            performSearch(keyword);
        }

        async function performSearch(searchTerm) {
            if (!searchTerm) return;
            resultsContainer.innerHTML = '<p>검색 중...</p>';

            const questionsRef = collection(db, 'questions');
            const q = query(questionsRef, where('title', '>=', searchTerm), where('title', '<=', searchTerm + '\uf8ff'));
            
            const snapshot = await getDocs(q);
            
            resultsContainer.innerHTML = '';
            if (snapshot.empty) {
                resultsContainer.innerHTML = '<p>검색 결과가 없습니다.</p>';
                return;
            }

            snapshot.forEach(doc => {
                const quiz = { id: doc.id, ...doc.data() };
                const card = createQuizCard(quiz.id, quiz);
                resultsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
