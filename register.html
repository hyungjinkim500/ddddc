<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 픽스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; display: flex; flex-direction: column; }
        .step { display: none; }
        .step.active { display: block; }
        .terms-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
        .terms-item:last-child { border-bottom: none; }
        .check-label { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
        .check-label input[type="checkbox"] { width: 20px; height: 20px; accent-color: #3b82f6; flex-shrink: 0; border-radius: 50%; }
        .view-btn { font-size: 0.75rem; color: #3b82f6; text-decoration: underline; flex-shrink: 0; background: none; border: none; cursor: pointer; }
        .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .input-row input { flex: 1; }
        .form-input { width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; outline: none; box-sizing: border-box; }
        .form-input:focus { border-color: #3b82f6; }
        .btn-primary { width: 100%; padding: 14px; background: #3ef0cc; color: #263559; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-outline { padding: 10px 16px; border: 1px solid #3ef0cc; color: #263559; background: white; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .msg { font-size: 0.75rem; margin-top: 4px; padding-left: 2px; }
        .msg.ok { color: #169976; }
        .msg.err { color: #ef4444; }
        .msg.info { color: #94a3b8; }
    </style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z333VZ22WB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Z333VZ22WB');
</script>
</head>
<body>
<div id="app">

    <!-- 상단 헤더 -->
    <div style="display:flex;align-items:center;padding:16px;border-bottom:1px solid #f1f5f9;">
        <button id="back-btn" onclick="history.back()" style="background:none;border:none;cursor:pointer;padding:4px;">
            <i class="fas fa-arrow-left text-slate-500 text-lg"></i>
        </button>
        <span id="step-title" style="flex:1;text-align:center;font-weight:700;font-size:1rem;">약관 동의 및 본인확인</span>
        <div style="width:32px;"></div>
    </div>

    <!-- 1단계: 약관동의 -->
    <div id="step1" class="step active" style="padding:24px 20px;flex:1;">
        <div style="margin-bottom:24px;">
            <!-- 전체동의 -->
            <div style="background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:16px;">
                <label class="check-label">
                    <input type="checkbox" id="all-agree" style="width:22px;height:22px;accent-color:#3b82f6;">
                    <span style="font-size:1rem;font-weight:700;color:#1e293b;">전체 동의</span>
                </label>
            </div>
            <!-- 개별 약관 -->
            <div style="padding:0 4px;">
                <div class="terms-item">
                    <label class="check-label">
                        <input type="checkbox" class="terms-required" id="chk-age">
                        <span style="font-size:0.9rem;color:#334155;">[필수] 만 14세 이상입니다</span>
                    </label>
                </div>
                <div class="terms-item">
                    <label class="check-label">
                        <input type="checkbox" class="terms-required" id="chk-service">
                        <span style="font-size:0.9rem;color:#334155;">[필수] 이용약관 동의</span>
                    </label>
                    <button class="view-btn" id="view-service-btn">보기</button>
                </div>
                <div class="terms-item">
                    <label class="check-label">
                        <input type="checkbox" class="terms-required" id="chk-privacy">
                        <span style="font-size:0.9rem;color:#334155;">[필수] 개인정보 수집 및 이용동의</span>
                    </label>
                    <button class="view-btn" id="view-privacy-btn">보기</button>
                </div>
                <div class="terms-item">
                    <label class="check-label">
                        <input type="checkbox" class="terms-required" id="chk-youth">
                        <span style="font-size:0.9rem;color:#334155;">[필수] 청소년보호정책 동의</span>
                    </label>
                    <button class="view-btn" id="view-youth-btn">보기</button>
                </div>
                <div class="terms-item">
                    <label class="check-label">
                        <input type="checkbox" id="chk-marketing">
                        <span style="font-size:0.9rem;color:#334155;">[선택] 마케팅 목적의 개인정보 수집 및 이용 동의</span>
                    </label>
                    <button class="view-btn" id="view-marketing-btn">보기</button>
                </div>

                <!-- 약관 모달 -->
                <div id="terms-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:flex-end;">
                    <div style="background:white;width:100%;max-width:480px;border-radius:20px 20px 0 0;max-height:80vh;display:flex;flex-direction:column;">
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9;">
                            <span id="terms-modal-title" style="font-weight:700;font-size:1rem;"></span>
                            <button id="terms-modal-close" style="background:none;border:none;font-size:1.5rem;color:#94a3b8;cursor:pointer;">×</button>
                        </div>
                        <div id="terms-modal-body" style="overflow-y:auto;padding:20px;font-size:0.85rem;color:#475569;line-height:1.8;"></div>
                    </div>
                </div>
            </div>
        </div>
        <button class="btn-primary" id="step1-next-btn">다음</button>
        <p style="text-align:center;font-size:0.8rem;color:#94a3b8;margin-top:16px;">
            이미 계정이 있으신가요? <a href="index.html" style="color:#3b82f6;font-weight:600;">로그인</a>
        </p>
    </div>

    <!-- 2단계: 정보입력 -->
    <div id="step2" class="step" style="padding:24px 20px;flex:1;">
        <div style="margin-bottom:20px;">
            <!-- 필수 섹션 타이틀 -->
            <p style="font-size:0.75rem;font-weight:700;color:#94a3b8;letter-spacing:0.05em;margin-bottom:12px;">— 필수 입력사항 —</p>
            <!-- 닉네임 -->
            <div style="margin-bottom:4px;">
                <p style="font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:6px;">닉네임</p>
                <div class="input-row">
                    <input type="text" id="input-nickname" class="form-input" placeholder="2자 이상 입력" maxlength="20">
                    <button class="btn-outline" id="check-nickname-btn">중복확인</button>
                </div>
                <p class="msg" id="nickname-msg"></p>
            </div>
            <!-- 이메일 -->
            <div style="margin-bottom:4px;margin-top:14px;">
                <p style="font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:6px;">이메일</p>
                <div class="input-row">
                    <input type="email" id="input-email" class="form-input" placeholder="example@email.com">
                    <button class="btn-outline" id="check-email-btn">중복확인</button>
                </div>
                <p class="msg" id="email-msg"></p>
            </div>
            <!-- 비밀번호 -->
            <div style="margin-bottom:4px;margin-top:14px;">
                <p style="font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:6px;">비밀번호</p>
                <input type="password" id="input-password" class="form-input" placeholder="8자 이상 입력" minlength="8">
            </div>
            <!-- 비밀번호 확인 -->
            <div style="margin-bottom:4px;margin-top:14px;">
                <p style="font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:6px;">비밀번호 확인</p>
                <input type="password" id="input-password-confirm" class="form-input" placeholder="비밀번호 재입력">
                <p class="msg" id="password-msg"></p>
            </div>
            <!-- 선택 섹션 타이틀 -->
            <p style="font-size:0.75rem;font-weight:700;color:#94a3b8;letter-spacing:0.05em;margin-top:28px;margin-bottom:12px;">— 선택 입력사항 —</p>
            <!-- 생일 (선택) -->
            <div id="birth-field" style="margin-bottom:4px;">
                <p style="font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:6px;">생년월일</p>
                <input type="date" id="input-birth" class="form-input">
            </div>
            <!-- 성별 (선택) -->
            <div id="gender-field" style="margin-top:14px;margin-bottom:4px;">
                <p style="font-size:0.8rem;font-weight:600;color:#475569;margin-bottom:6px;">성별</p>
                <select id="input-gender" class="form-input" style="color:#64748b;">
                    <option value="">선택 안함</option>
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                    <option value="other">기타</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" id="register-btn">이메일 인증 및 가입하기</button>
        <p style="text-align:center;font-size:0.8rem;color:#94a3b8;margin-top:16px;">
            <a href="#" id="back-to-step1" style="color:#3b82f6;">이전 단계로 돌아가기</a>
        </p>
    </div>

</div>
<script type="module" src="register.js"></script>
</body>
</html>
