
<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap');
        
        :root {
            --pm-navy: #0e1117;
            --pm-teal: #00d395; 
            --pm-teal-dark: #00a876;
            --bg-primary-light: #f1f5f9; /* Light mode background */
            --bg-primary-dark: #020617; /* Dark mode background */
            --text-primary-light: #1e293b;
            --text-primary-dark: #e2e8f0;
            --card-bg-light: white;
            --card-bg-dark: #0f172a;
            --border-light: #e2e8f0;
            --border-dark: #1e293b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.025em;
            word-break: keep-all;
            background-color: var(--bg-primary-light);
            color: var(--text-primary-light);
        }
        html.dark body {
            background-color: var(--bg-primary-dark);
            color: var(--text-primary-dark);
        }
        
        .xylophone-logo { display: flex; gap: 3px; align-items: flex-end; height: 20px; }
        .xy-bar { background-color: var(--pm-teal); width: 5px; border-radius: 2px; }
        .xy-1 { height: 12px; }
        .xy-2 { height: 16px; }
        .xy-3 { height: 20px; }
        .xy-mallet { width: 8px; height: 8px; border-radius: 50%; background-color: white; border: 2px solid var(--pm-teal); margin-bottom: 12px; margin-left: -2px; }

        .text-teal { color: var(--pm-teal); }
        .bg-teal { background-color: var(--pm-teal); }
        .btn-primary { background-color: var(--pm-teal); color: var(--pm-navy); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(14, 17, 23, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0s linear 0.3s; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
        .modal-overlay.show { opacity: 1; visibility: visible; transition: opacity 0.3s ease; }
        .modal-content { background-color: var(--card-bg-light); padding: 2.5rem; border-radius: 1rem; width: 90%; max-width: 420px; position: relative; transform: translateY(20px); transition: transform 0.3s ease, min-height 0.3s ease-out; overflow-y: auto; max-height: 90vh; }
        html.dark .modal-content { background-color: var(--card-bg-dark); }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-close-button { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; line-height: 1; color: #9ca3af; cursor: pointer; border: none; background: none; }
        html.dark .modal-close-button { color: #6b7280; }
    </style>
</head>

              서울

            <button class="tab-button px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">

        </div>
        <a href="ranking.html" class="font-bold text-slate-700 dark:text-slate-200 hover:underline">
          랭킹보드

      </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">

      <div id="category-hot-section" class="mb-6">

<!-- Login/Register Modal -->

                        <path d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.859-2.9973.859-2.31 0-4.2695-1.56-4.9682-3.6582H1.0582v2.3318C2.5418 15.7995 5.56 18 9 18z" fill="#34A853"></path>
                        <path d="M4.0318 10.71c-.19-.54-.3018-1.11-.3018-1.71s.1118-1.17.3018-1.71V4.9582H1.0582C.3764 6.3468 0 7.6232 0 9c0 1.3768.3764 2.6532 1.0582 4.0418L4.0318 10.71z" fill="#FBBC05"></path>
                        <path d="M9 3.5455c1.3218 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.43 0 9 0 5.56 0 2.5418 2.2005 1.0582 5.2895l2.9736 2.3318c.6986-2.0982 2.6582-3.6582 4.9682-3.6582z" fill="#EA4335"></path>

</div>

<script type="module" src="firebase-config.js" defer></script>
<script type="module" src="auth.js" defer></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const themeToggle = document.getElementById('theme-toggle');
        if(themeToggle) {
            const html = document.documentElement;
            const icon = themeToggle.querySelector('i');
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.classList.add(savedTheme);
            if (savedTheme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
            themeToggle.addEventListener('click', () => {
                if (html.classList.contains('dark')) {
                    html.classList.remove('dark'); html.classList.add('light'); localStorage.setItem('theme', 'light');
                    icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                } else {
                    html.classList.remove('light'); html.classList.add('dark'); localStorage.setItem('theme', 'dark');
                    icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                }
            });
        }
    });
</script>
<script type="module">
    import { db, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "./firebase-config.js";

    let hotQuizzes = [];
    let hotIndex = 0;

    async function loadCategory(categoryId) {
        const categoryTitleEl = document.getElementById("category-title");
        if (!categoryId) {
            categoryTitleEl.textContent = "카테고리 ID가 없습니다.";
            return;
        }

        try {
            const categoryRef = doc(db, "categories", categoryId);
            const categorySnap = await getDoc(categoryRef);

            if (categorySnap.exists()) {
                const categoryName = categorySnap.data().name;
                categoryTitleEl.textContent = `${categoryName} 카테고리`;
                loadCategoryQuizzes(categoryId);
                loadHotQuizzes(categoryId);
            } else {
                categoryTitleEl.textContent = "카테고리를 찾을 수 없습니다.";
            }
        } catch (error) {
            console.error("Error loading category:", error);
            categoryTitleEl.textContent = "카테고리를 불러오는 중 오류가 발생했습니다.";
        }
    }
    function formatBoardTime(date) {

        const now = new Date();
        const diff = now - date;

        const oneDay = 24 * 60 * 60 * 1000;

        if (diff < oneDay) {
            return date.toLocaleTimeString("ko-KR", {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            });
        }

        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${month}.${day}`;
    }

    async function loadCategoryQuizzes(categoryId) {
        const listEl = document.getElementById("category-quiz-list");
        listEl.innerHTML = "";

        const q = query(
            collection(db, "questions"),
            where("category", "==", categoryId),
            orderBy("createdAt", "desc"),
            limit(20)
        );

        const snapshot = await getDocs(q);

        snapshot.forEach(doc => {
            const quiz = doc.data();
            const quizId = doc.id;
            const views = quiz.views ?? quiz.viewsCount ?? 0;
            const comments = quiz.commentsCount ?? 0;
            const likes = quiz.likesCount ?? 0;
            const createdAt = quiz.createdAt;

            let createdTime = "";
            if (createdAt && createdAt.toDate) {
                const date = createdAt.toDate();
                createdTime = formatBoardTime(date);
            }

            const item = document.createElement("div");
            item.className = "border rounded-lg p-4 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition";
            item.style.cursor = "pointer";
            item.addEventListener("click", () => {
                window.location.href = `quiz.html?id=${quizId}`;
            });

            item.innerHTML = `
              <div class="font-bold text-sm text-emerald-500">
                ${quiz.isSuper ? "슈퍼퀴즈" : "퀴즈"}
              </div>
              <div class="text-lg font-semibold mt-1">
                ${quiz.title || "제목 없음"}
              </div>
              <div class="text-xs text-slate-500 mt-2">
                ${quiz.creatorName || "익명"}
| <span class="inline-flex items-center gap-1"> <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-red-500"> <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /> </svg>
${likes} </span>
| 조회 ${views}
| 댓글 ${comments}
| ${createdTime}
              </div>
            `;
            listEl.appendChild(item);
        });
    }

    async function loadHotQuizzes(categoryId) {
        const q = query(
            collection(db, "questions"),
            where("category", "==", categoryId),
            orderBy("popularityScore", "desc"),
            limit(10)
        );

        const snapshot = await getDocs(q);

        snapshot.forEach(doc => {
            hotQuizzes.push({
                id: doc.id,
                ...doc.data()
            });
        });

        renderHotQuizzes();
    }

    function renderHotQuizzes() {
        const container = document.getElementById("category-hot-list");
        container.innerHTML = "";

        const visible = hotQuizzes.slice(hotIndex, hotIndex + 5);

        visible.forEach(quiz => {
            const item = document.createElement("div");
            item.className = "border rounded-lg p-3 bg-white dark:bg-slate-800 cursor-pointer";
            item.innerHTML = `
              <div class="text-sm font-semibold">
                ${quiz.title || "제목 없음"}
              </div>
            `;
            container.appendChild(item);
        });
    }

    document.getElementById("hot-next").addEventListener("click", () => {
        if (hotIndex + 5 < hotQuizzes.length) {
            hotIndex += 5;
            renderHotQuizzes();
        }
    });

    document.getElementById("hot-prev").addEventListener("click", () => {
        if (hotIndex - 5 >= 0) {
            hotIndex -= 5;
            renderHotQuizzes();
        }
    });

    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const categoryId = params.get("cat");
        loadCategory(categoryId);
    });
</script>
<script type="module">
    import { auth } from './firebase-config.js';
    document.getElementById("create-quiz-btn").addEventListener("click", (e) => {
        e.preventDefault();
        if (auth.currentUser) {
            window.location.href = "create-quiz.html";
        } else {
            alert("로그인이 필요한 서비스 입니다. 로그인해주세요.");
        }
    });
</script>
