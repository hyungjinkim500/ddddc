
<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 | 집단지성 플랫폼 <픽스></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Pretendard:wght@400;600;700&display=swap');
        
        :root {
            --pm-navy: #0e1117;
            --pm-teal: #00d395; 
            --pm-teal-dark: #00a876;
            --bg-primary-light: #f8f7f4; /* Light mode background */
            --bg-primary-dark: #020617; /* Dark mode background */
            --text-primary-light: #1e293b;
            --text-primary-dark: #e2e8f0;
            --card-bg-light: white;
            --card-bg-dark: #0f172a;
            --border-light: #e2e8f0;
            --border-dark: #1e293b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.025em;
            word-break: keep-all;
            background-color: var(--bg-primary-light);
            color: var(--text-primary-light);
        }
        html.dark body {
            background-color: var(--bg-primary-dark);
            color: var(--text-primary-dark);
        }
        
        .xylophone-logo { display: flex; gap: 3px; align-items: flex-end; height: 20px; }
        .xy-bar { background-color: var(--pm-teal); width: 5px; border-radius: 2px; }
        .xy-1 { height: 12px; }
        .xy-2 { height: 16px; }
        .xy-3 { height: 20px; }
        .xy-mallet { width: 8px; height: 8px; border-radius: 50%; background-color: white; border: 2px solid var(--pm-teal); margin-bottom: 12px; margin-left: -2px; }

        .text-teal { color: var(--pm-teal); }
        .bg-teal { background-color: var(--pm-teal); }
        .btn-primary { background-color: var(--pm-teal); color: var(--pm-navy); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(14, 17, 23, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0s linear 0.3s; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
        .modal-overlay.show { opacity: 1; visibility: visible; transition: opacity 0.3s ease; }
        .modal-content { background-color: var(--card-bg-light); padding: 2.5rem; border-radius: 1rem; width: 90%; max-width: 420px; position: relative; transform: translateY(20px); transition: transform 0.3s ease, min-height 0.3s ease-out; overflow-y: auto; max-height: 90vh; }
        html.dark .modal-content { background-color: var(--card-bg-dark); }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-close-button { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; line-height: 1; color: #9ca3af; cursor: pointer; border: none; background: none; }
        html.dark .modal-close-button { color: #6b7280; }
    </style>
</head>
<body class="transition-colors duration-300">

<div id="header-container"></div>

<main class="container mx-auto px-4 py-8">
    <div class="container mx-auto px-4 py-8">
      <h1 id="category-title" class="text-2xl font-bold mb-8"></h1>
      
      <div id="category-hot-section" class="mb-6">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-bold">🔥 HOT PIX</h2>
          <div class="flex gap-2">
            <button id="hot-prev" class="w-8 h-8 rounded-full border flex items-center justify-center">‹</button>
            <button id="hot-next" class="w-8 h-8 rounded-full border flex items-center justify-center">›</button>
          </div>
        </div>
        <div style="overflow: hidden;">
          <div id="hot-slider" class="flex transition-transform duration-500 ease-in-out"></div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-6 mt-6">
        <div class="col-span-2">
          <div id="category-quiz-list" class="space-y-3"></div>
          <div id="quiz-pagination" class="flex justify-center items-center gap-2 mt-6">
            <button id="page-prev"
              class="px-3 py-1 border rounded text-sm hover:bg-slate-100">
              이전
            </button>
            <div id="page-numbers" class="flex gap-1"></div>
            <button id="page-next"
              class="px-3 py-1 border rounded text-sm hover:bg-slate-100">
              다음
            </button>
          </div>
        </div>
        <div id="category-sidebar" class="space-y-6">
          <!-- A Search Box -->
          <div class="bg-white dark:bg-slate-800 border rounded-lg p-4">
            <input
              type="text"
              placeholder="검색어를 입력하세요"
              class="w-full border rounded px-3 py-2 text-sm"
            />
          </div>

          <!-- B Popular Keywords -->
          <div class="bg-white dark:bg-slate-800 border rounded-lg p-4">
            <div class="text-sm font-semibold mb-2">인기 키워드</div>
            <div class="flex flex-wrap gap-2">
              <span class="px-2 py-1 text-xs bg-slate-100 rounded">#인기</span>
              <span class="px-2 py-1 text-xs bg-slate-100 rounded">#효율</span>
              <span class="px-2 py-1 text-xs bg-slate-100 rounded">#댓글</span>
            </div>
          </div>

          <!-- C Advertisement -->
          <div class="bg-white dark:bg-slate-800 border rounded-lg p-6 text-center text-sm text-slate-400">
            Ad Placeholder
          </div>
        </div>
      </div>
    </div>
</main>

<!-- Login/Register Modal -->
<div id="login-modal" class="modal-overlay">
    <div class="modal-content">
        <button id="login-modal-close-button" class="modal-close-button">&times;</button>
        
        <!-- Login View -->
        <div id="login-view">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">로그인</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">딩동댕닷컴에 오신 것을 환영합니다!</p>
            </div>
            <div class="space-y-3">
                <button id="google-login-button" class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-white dark:bg-slate-700 hover:bg-slate-50 dark:hover:bg-slate-600 transition border border-slate-200 dark:border-slate-600">
                    <svg class="w-5 h-5" viewBox="0 0 18 18" aria-hidden="true">
                      <g fill="none" fill-rule="evenodd">
                        <path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1682-1.8409H9v3.4818h4.8436c-.2086 1.125-.8427 2.0782-1.7963 2.7164v2.2581h2.9087c1.7018-1.5668 2.6836-3.874 2.6836-6.6155z" fill="#4285F4"></path>
                        <path d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.859-2.9973.859-2.31 0-4.2695-1.56-4.9682-3.6582H1.0582v2.3318C2.5418 15.7995 5.56 18 9 18z" fill="#34A853"></path>
                        <path d="M4.0318 10.71c-.19-.54-.3018-1.11-.3018-1.71s.1118-1.17.3018-1.71V4.9582H1.0582C.3764 6.3468 0 7.6232 0 9c0 1.3768.3764 2.6532 1.0582 4.0418L4.0318 10.71z" fill="#FBBC05"></path>
                        <path d="M9 3.5455c1.3218 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.43 0 9 0 5.56 0 2.5418 2.2005 1.0582 5.2895l2.9736 2.3318c.6986-2.0982 2.6582-3.6582 4.9682-3.6582z" fill="#EA4335"></path>
                      </g>
                    </svg>
                    <span class="font-bold text-slate-700 dark:text-slate-200">Google 계정으로 로그인</span>
                </button>
            </div>
            <div class="my-6 flex items-center">
                <hr class="w-full border-slate-200 dark:border-slate-700"/><span class="px-4 text-xs font-semibold text-slate-400 dark:text-slate-500">OR</span><hr class="w-full border-slate-200 dark:border-slate-700"/>
            </div>
            <form id="login-form" class="space-y-4">
                <div><input type="email" name="email" placeholder="이메일 주소를 입력하세요" class="w-full px-4 py-3 rounded-md bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-teal text-sm transition"></div>
                <div><input type="password" name="password" placeholder="비밀번호를 입력하세요" class="w-full px-4 py-3 rounded-md bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-teal text-sm transition"></div>
                <div class="flex items-center justify-between text-sm">
                    <a href="#" class="font-semibold text-teal hover:underline">비밀번호 찾기</a>
                </div>
                <div><button type="submit" class="w-full btn-primary px-5 py-3 rounded-lg font-bold text-base transition-all hover:opacity-90 mt-2">로그인</button></div>
            </form>
            <p class="text-center text-sm mt-6 text-slate-500 dark:text-slate-400">계정이 없으신가요? <a href="#" id="show-register-view-link" class="font-semibold text-teal hover:underline">회원가입</a></p>
        </div>

        <!-- Register View (Now a 2-step process) -->
        <div id="register-view" style="display: none;">
            <!-- Content will be handled by auth.js -->
        </div>
    </div>
</div>

<script type="module" src="firebase-config.js" defer></script>
<script type="module" src="auth.js" defer></script>
<script type="module" src="header.js" defer></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const themeToggle = document.getElementById('theme-toggle');
        if(themeToggle) {
            const html = document.documentElement;
            const icon = themeToggle.querySelector('i');
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.classList.add(savedTheme);
            if (savedTheme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
            themeToggle.addEventListener('click', () => {
                if (html.classList.contains('dark')) {
                    html.classList.remove('dark'); html.classList.add('light'); localStorage.setItem('theme', 'light');
                    icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                } else {
                    html.classList.remove('light'); html.classList.add('dark'); localStorage.setItem('theme', 'dark');
                    icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                }
            });
        }
    });
</script>
<script type="module" src="category.js"></script>
</body>
</html>
