<script>
document.addEventListener('DOMContentLoaded', () => {
    // 퀵서치
    const headerSearchBtn = document.getElementById('header-search-btn');
    const quickSearchBar = document.getElementById('quick-search-bar');
    const quickSearchInput = document.getElementById('quick-search-input');
    const quickSearchSubmit = document.getElementById('quick-search-submit');
    const quickSearchCancel = document.getElementById('quick-search-cancel');

    headerSearchBtn?.addEventListener('click', () => {
        const isOpen = quickSearchBar.classList.contains('open');
        if (isOpen) {
            quickSearchBar.classList.remove('open');
            if (quickSearchInput) quickSearchInput.value = '';
        } else {
            quickSearchBar.classList.add('open');
            setTimeout(() => quickSearchInput?.focus(), 50);
        }
    });
    quickSearchCancel?.addEventListener('click', () => {
        quickSearchBar.classList.remove('open');
        if (quickSearchInput) quickSearchInput.value = '';
    });
    function submitQuickSearch() {
        const val = quickSearchInput?.value.trim();
        if (val) window.location.href = `explore.html?q=${encodeURIComponent(val)}`;
    }
    quickSearchSubmit?.addEventListener('click', submitQuickSearch);
    quickSearchInput?.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitQuickSearch();
        if (e.key === 'Escape') quickSearchCancel?.click();
    });
});
</script>

<script>
(function() {
    const phrases = [
        { html: '<span style="color:#fb5498">세상</span>은 <span style="color:#624dea">선택</span>으로\n만들어진다.' },
        { html: '<span style="color:#fb5498">당신</span>의 <span style="color:#624dea">PICK</span>이\n세상을 만든다.' },
        { html: '<span style="color:#fb5498">선택</span>이 모이면,\n<span style="color:#624dea">지성</span>이 보인다.' },
        { html: '세상의 모든 <span style="color:#fb5498">선택</span>\n-픽스' },
        { html: '<span style="color:#fb5498">집단</span> <span style="color:#624dea">지성</span> 플랫폼\n-픽스' },
    ];

    let phraseIdx = 0;
    let charIdx = 0;
    let isDeleting = false;
    let plainTexts = [];
    let timer = null;

    function getPlainText(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        return div.textContent;
    }

    function buildPartialHtml(fullHtml, visibleCount) {
        const div = document.createElement('div');
        div.innerHTML = fullHtml;
        let count = 0;
        function walk(node) {
            if (count >= visibleCount) { node.parentNode && node.parentNode.removeChild(node); return; }
            if (node.nodeType === 3) {
                const available = visibleCount - count;
                if (node.textContent.length > available) {
                    node.textContent = node.textContent.slice(0, available);
                }
                count += node.textContent.length;
            } else if (node.nodeType === 1) {
                Array.from(node.childNodes).forEach(walk);
                if (node.textContent.length === 0) node.parentNode && node.parentNode.removeChild(node);
            }
        }
        Array.from(div.childNodes).forEach(walk);
        return div.innerHTML;
    }

    function type() {
        const el = document.getElementById('catchphrase');
        if (!el) return;
        const cur = phrases[phraseIdx];
        if (!plainTexts[phraseIdx]) plainTexts[phraseIdx] = getPlainText(cur.html);
        const plain = plainTexts[phraseIdx];

        if (!isDeleting) {
            charIdx++;
            el.innerHTML = buildPartialHtml(cur.html, charIdx) + '<span id="cursor"></span>';
            if (charIdx >= plain.length) {
                timer = setTimeout(() => { isDeleting = true; type(); }, 12200);
                return;
            }
            timer = setTimeout(type, 100);
        } else {
            charIdx--;
            el.innerHTML = buildPartialHtml(cur.html, charIdx) + '<span id="cursor"></span>';
            if (charIdx <= 0) {
                isDeleting = false;
                phraseIdx = (phraseIdx + 1) % phrases.length;
                timer = setTimeout(type, 300);
                return;
            }
            timer = setTimeout(type, 50);
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(type, 700);
    });
})();
</script>
