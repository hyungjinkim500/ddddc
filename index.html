<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
        }
        html.dark body { background-color: #0f172a; }

        /* 앱 컨테이너 */
        #app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f8f7f4;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        html.dark #app { background: #1e293b; }

        /* 상단 헤더 고정 */
        #top-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
        }
        html.dark #top-header {
            background: #1e293b;
        }

        /* 로고바 - 스크롤 시 자연스럽게 위로 사라짐 */
        #logo-bar {
            position: relative;
            z-index: 60;
            background: #f8f7f4;
            border-bottom: 1px solid #e2e8f0;
        }
        html.dark #logo-bar {
            background: #1e293b;
            border-color: #334155;
        }

        /* 피드탭 스크롤 - 숨쉬는 헤더 적용 */
        #feed-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 8px 16px;
            background: #f8f7f4;
            border-bottom: 1px solid #e2e8f0;
            
            position: sticky;
            top: 0; /* 화면 최상단에 붙어서 숨쉬는 헤더 역할 */
            z-index: 55;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        /* 탭이 숨겨질 때 적용될 클래스 */
        #feed-tabs.hidden-tab {
            transform: translateY(-100%);
        }
        /* 탭이 보일 때 그림자 효과 */
        #feed-tabs.visible-tab {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #feed-tabs::-webkit-scrollbar { display: none; }
        html.dark #feed-tabs {
            background: #1e293b;
            border-color: #334155;
        }

        .feed-tab-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
        }
        .feed-tab-btn.active {
            background: #169976;
            color: white;
            border-color: #169976;
        }
        html.dark .feed-tab-btn {
            background: #334155;
            color: #94a3b8;
            border-color: #475569;
        }
        html.dark .feed-tab-btn.active {
            background: #169976;
            color: white;
            border-color: #169976;
        }

        /* 피드 영역 */
        #feed-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
            padding-bottom: 80px;
        }

        /* 하단 네비게이션 고정 */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            z-index: 50;
        }
        html.dark #bottom-nav {
            background: #1e293b;
            border-color: #334155;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            font-size: 10px;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: none;
            gap: 3px;
        }
        .nav-btn.active { color: #169976; }
        .nav-btn i { font-size: 20px; }

        /* 픽하기 버튼 (가운데) */
        .nav-btn.pick-btn {
            color: white;
        }
        .nav-btn.pick-btn .pick-circle {
            width: 48px;
            height: 48px;
            background: #169976;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 4px 12px rgba(22,153,118,0.4);
        }
        .nav-btn.pick-btn .pick-circle i { font-size: 22px; color: white; }
        
        /* 로그인 모달 스타일 */
        #login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #login-modal.show {
            display: flex;
        }
        .login-modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
        html.dark .login-modal-content {
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- 로고바 (항상 고정) -->
    <div id="logo-bar">
        <div class="flex items-center justify-between px-4 py-2">
            <a href="index.html" onclick="location.reload(); return false;">
                <img src="./pix_logo_nobackground.png" alt="픽스" class="h-8">
            </a>
            <div class="flex items-center gap-3">
                <button id="header-search-btn" class="text-slate-500 dark:text-slate-400 hover:text-[#169976] transition cursor-pointer">
                    <i class="fas fa-search text-lg"></i>
                </button>
                <button id="login-modal-button" class="text-sm font-bold px-3 py-1.5 rounded-lg bg-[#169976] text-white cursor-pointer">
                    로그인
                </button>
                <div id="header-user-area" class="hidden items-center gap-2">
                    <img id="header-avatar" class="w-8 h-8 rounded-full border border-slate-200 cursor-pointer hover:opacity-80 transition">
                </div>
            </div>
        </div>
    </div>

    <!-- 상단 헤더 (탭만, 스크롤 시 함께 내려감) -->
    <header id="top-header">
        <!-- 피드 탭 -->
        <div id="feed-tabs">
            <button class="feed-tab-btn active" data-tab="latest">🆕 최신</button>
            <button class="feed-tab-btn" data-tab="hot">🔥 핫</button>
            <button class="feed-tab-btn" data-tab="weekly">👑 위클리</button>
            <button class="feed-tab-btn" data-tab="pix-only">PIX만</button>
            <button class="feed-tab-btn" data-tab="most-comments">💬 댓글많은</button>
            <button class="feed-tab-btn" data-tab="extreme">📊 극단결과</button>
        </div>
    </header>

    <!-- 피드 영역 -->
    <main id="feed-container">
        <div id="feed-list" class="space-y-3 px-3"></div>
        <div id="feed-loader" class="text-center py-6 text-slate-400 text-sm hidden">
            불러오는 중...
        </div>
        <div id="feed-end" class="text-center py-6 text-slate-400 text-sm hidden">
            모든 게시글을 불러왔습니다.
        </div>
    </main>

    <!-- 하단 네비게이션 -->
    <nav id="bottom-nav">
        <a href="index.html" class="nav-btn active">
            <i class="fas fa-home"></i>
            <span>홈</span>
        </a>
        <a href="explore.html" class="nav-btn">
            <i class="fas fa-compass"></i>
            <span>탐색</span>
        </a>
        <a href="create-post.html" class="nav-btn pick-btn">
            <div class="pick-circle">
                <i class="fas fa-plus"></i>
            </div>
            <span style="color:#169976; font-size:10px; margin-top:2px;">픽하기</span>
        </a>
        <a href="#" class="nav-btn" id="nav-alarm">
            <i class="fas fa-bell"></i>
            <span>알림</span>
        </a>
        <a href="mypage.html" class="nav-btn">
            <i class="fas fa-user"></i>
            <span>마이</span>
        </a>
    </nav>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="header.js"></script>
<script type="module" src="index.js"></script>

<!-- 로그인 모달 -->
<div id="login-modal">
    <div class="login-modal-content">
        <button id="login-modal-close-button" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600 text-xl">&times;</button>
        
        <div id="login-view">
            <h2 class="text-xl font-bold mb-4 text-center">로그인</h2>
            <form id="login-form" class="space-y-3">
                <input type="email" name="email" placeholder="이메일" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600" required>
                <input type="password" name="password" placeholder="비밀번호" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600" required>
                <button type="submit" class="w-full bg-[#169976] text-white py-2 rounded-lg font-bold">로그인</button>
            </form>
            <button id="google-login-button" class="w-full mt-3 border border-slate-300 py-2 rounded-lg font-semibold hover:bg-slate-50 dark:border-slate-600 dark:hover:bg-slate-700">구글로 로그인</button>
            <p class="text-center text-sm mt-4 text-slate-500">
                계정이 없으신가요? <a href="#" id="show-register-view-link" class="text-[#169976] font-bold">회원가입</a>
            </p>
        </div>

        <div id="register-view" style="display:none;">
            <h2 class="text-xl font-bold mb-4 text-center">회원가입</h2>
            <form id="register-form" class="space-y-3">
                <input type="text" name="nickname" placeholder="닉네임" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600" required>
                <input type="email" name="email" placeholder="이메일" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600" required>
                <input type="password" name="password" placeholder="비밀번호" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600" required>
                <button type="submit" class="w-full bg-[#169976] text-white py-2 rounded-lg font-bold">가입하기</button>
            </form>
            <p class="text-center text-sm mt-4 text-slate-500">
                이미 계정이 있으신가요? <a href="#" id="show-login-view-link-from-terms" class="text-[#169976] font-bold">로그인</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
