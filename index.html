<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세상은 선택으로 만들어진다 | 픽스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
        }
        html.dark body { background-color: #0f172a; }

        /* 앱 컨테이너 */
        #app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f8f7f4;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        html.dark #app { background: #1e293b; }

        /* 상단 헤더 고정 */
        #top-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
        }
        html.dark #top-header {
            background: #1e293b;
        }

        /* 퀵서치 바 */
        #quick-search-bar {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease, padding 0.25s ease;
            background: white;
            border-bottom: 1px solid transparent;
        }
        html.dark #quick-search-bar {
            background: #1e293b;
        }
        #quick-search-bar.open {
            max-height: 60px;
            border-color: #e2e8f0;
            padding: 8px 16px;
        }
        html.dark #quick-search-bar.open {
            border-color: #334155;
        }
        #quick-search-input {
            flex: 1;
            background: #f1f5f9;
            border: none;
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 14px;
            outline: none;
            color: #1e293b;
        }
        html.dark #quick-search-input {
            background: #334155;
            color: #e2e8f0;
        }
        #quick-search-input::placeholder { color: #94a3b8; }

        /* 로고바 - 스크롤 시 자연스럽게 위로 사라짐 */
        #logo-bar {
            position: relative;
            z-index: 60;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        html.dark #logo-bar {
            background: #1e293b;
            border-color: #334155;
        }

        /* 피드탭 스크롤 - 숨쉬는 헤더 적용 */
        #feed-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 8px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            
            position: sticky;
            top: 0; /* 화면 최상단에 붙어서 숨쉬는 헤더 역할 */
            z-index: 55;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        /* 탭이 숨겨질 때 적용될 클래스 */
        #feed-tabs.hidden-tab {
            transform: translateY(-100%);
        }
        /* 탭이 보일 때 그림자 효과 */
        #feed-tabs.visible-tab {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #feed-tabs::-webkit-scrollbar { display: none; }
        html.dark #feed-tabs {
            background: #1e293b;
            border-color: #334155;
        }

        .feed-tab-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
        }
        .feed-tab-btn.active {
            background: #f8f7f4;
            color: #263559;
            border-color: #263559;
        }
        html.dark .feed-tab-btn {
            background: #334155;
            color: #94a3b8;
            border-color: #475569;
        }
        html.dark .feed-tab-btn.active {
            background: #169976;
            color: white;
            border-color: #169976;
        }

        /* 피드 영역 */
        #feed-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            padding-bottom: 80px;
        }

        
        /* 로그인 모달 스타일 */
        #login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #login-modal.show {
            display: flex;
        }
        .login-modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
        html.dark .login-modal-content {
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- 로고바 (항상 고정) -->
    <div id="logo-bar">
        <div class="flex items-center justify-between px-4 py-2">
            <a href="index.html" onclick="location.reload(); return false;">
                <img src="./pix_logo_nobackground.png" alt="픽스" class="h-14">
            </a>
            <div class="flex items-center gap-3">
                <button id="header-search-btn" class="text-slate-500 dark:text-slate-400 hover:text-[#169976] transition cursor-pointer">
                    <i class="fas fa-search text-lg"></i>
                </button>
                <button id="login-modal-button" class="text-sm font-bold px-3 py-1.5 rounded-lg bg-[#3ef0cc] text-#263559 cursor-pointer">
                    로그인
                </button>
                <div id="header-user-area" class="hidden items-center gap-2">
                    <img id="header-avatar" class="w-8 h-8 rounded-full border border-slate-200 cursor-pointer hover:opacity-80 transition">
                </div>
            </div>
        </div>
    </div>

    <!-- 퀵서치 바 -->
    <div id="quick-search-bar">
        <div class="flex items-center gap-2">
            <input
                type="text"
                id="quick-search-input"
                placeholder="검색어를 입력하세요"
                autocomplete="off"
            >
            <button id="quick-search-submit"
                class="px-4 py-1.5 rounded-full bg-[#2ee7cf] text-#263559 text-sm font-bold flex-shrink-0">
                검색
            </button>
            <button id="quick-search-cancel"
                class="px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 text-sm flex-shrink-0">
                취소
            </button>
        </div>
    </div>

    <!-- 상단 헤더 (탭만, 스크롤 시 함께 내려감) -->
    <header id="top-header">
        <!-- 피드 탭 -->
        <div id="feed-tabs">
            <button class="feed-tab-btn active" data-tab="latest">🆕 최신</button>
            <button class="feed-tab-btn" data-tab="hot">🔥 핫</button>
            <button class="feed-tab-btn" data-tab="weekly">👑 위클리</button>
            <button class="feed-tab-btn" data-tab="pix-only">PIX만</button>
            <button class="feed-tab-btn" data-tab="most-comments">💬 댓글많은</button>
            <button class="feed-tab-btn" data-tab="extreme">📊 극단결과</button>
        </div>
    </header>

    <!-- 피드 영역 -->
    <main id="feed-container">
        <div id="feed-list" class="space-y-2 bg-#f8f7f4 dark:bg-slate-900"></div>
        <div id="feed-loader" class="text-center py-6 text-slate-400 text-sm hidden">
            불러오는 중...
        </div>
        <div id="feed-end" class="text-center py-6 text-slate-400 text-sm hidden">
            모든 게시글을 불러왔습니다.
        </div>
    </main>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 퀵서치
    const headerSearchBtn = document.getElementById('header-search-btn');
    const quickSearchBar = document.getElementById('quick-search-bar');
    const quickSearchInput = document.getElementById('quick-search-input');
    const quickSearchSubmit = document.getElementById('quick-search-submit');
    const quickSearchCancel = document.getElementById('quick-search-cancel');

    headerSearchBtn?.addEventListener('click', () => {
        const isOpen = quickSearchBar.classList.contains('open');
        if (isOpen) {
            quickSearchBar.classList.remove('open');
            if (quickSearchInput) quickSearchInput.value = '';
        } else {
            quickSearchBar.classList.add('open');
            setTimeout(() => quickSearchInput?.focus(), 50);
        }
    });
    quickSearchCancel?.addEventListener('click', () => {
        quickSearchBar.classList.remove('open');
        if (quickSearchInput) quickSearchInput.value = '';
    });
    function submitQuickSearch() {
        const val = quickSearchInput?.value.trim();
        if (val) window.location.href = `explore.html?q=${encodeURIComponent(val)}`;
    }
    quickSearchSubmit?.addEventListener('click', submitQuickSearch);
    quickSearchInput?.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitQuickSearch();
        if (e.key === 'Escape') quickSearchCancel?.click();
    });
});
</script>

<script src="nav.js"></script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="header.js"></script>
<script type="module" src="index.js"></script>

<!-- 로그인 모달은 auth.js에서 동적 주입 -->
</body>
</html>
