<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽스 | 글쓰기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        html.dark body { background-color: #0f172a; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; display: flex; flex-direction: column; }
        html.dark #app { background: #1e293b; }
        #top-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        html.dark #top-header { background: #1e293b; border-color: #334155; }
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 40px; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(14,17,23,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0s linear 0.3s; }
        .modal-overlay.show { opacity: 1; visibility: visible; transition: opacity 0.3s ease; }
        .modal-content { background: white; padding: 1.5rem; border-radius: 1rem; width: 90%; max-width: 400px; position: relative; max-height: 80vh; overflow-y: auto; }
        html.dark .modal-content { background: #1e293b; color: white; }
        /* 액션시트 */
        #option-action-sheet { position: fixed; inset: 0; z-index: 200; display: none; }
        #option-action-sheet.show { display: block; }
        #option-action-sheet .backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        #option-action-sheet .sheet { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-radius: 1.2rem 1.2rem 0 0; padding: 1rem; }
        html.dark #option-action-sheet .sheet { background: #1e293b; }
        #option-action-sheet .sheet-btn { display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.85rem 0.5rem; font-size: 0.95rem; color: #1e293b; border-bottom: 1px solid #f1f5f9; }
        html.dark #option-action-sheet .sheet-btn { color: #f1f5f9; border-color: #334155; }
        #option-action-sheet .sheet-btn:last-child { border-bottom: none; }
        #option-action-sheet .sheet-btn.danger { color: #ef4444; }

        /* 크롭 전체화면 */
        #crop-screen { position: fixed; inset: 0; z-index: 300; background: #000; display: none; flex-direction: column; }
        #crop-screen.show { display: flex; }
        #crop-screen .crop-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: #111; }
        #crop-screen .crop-header span { color: white; font-weight: 700; font-size: 0.95rem; }
        #crop-screen .crop-area { flex: 1; overflow: hidden; position: relative; }
        #crop-screen .crop-area img { max-width: 100%; max-height: 100%; display: block; }
        #crop-screen .save-btn { background: #169976; color: white; font-weight: 700; padding: 0.4rem 1.1rem; border-radius: 0.6rem; font-size: 0.9rem; }
    </style>
</head>
<body>
<div id="app">

    <!-- 상단 헤더 -->
    <header id="top-header">
        <div class="flex items-center justify-between px-4 py-3">
            <button onclick="history.back()" class="text-slate-500 dark:text-slate-400">
                <i class="fas fa-times text-lg"></i>
            </button>
            <span id="page-title" class="font-bold text-slate-800 dark:text-white text-sm">새 게시물</span>
            <button type="submit" form="create-quiz-form"
                class="text-sm font-bold text-white bg-[#169976] px-4 py-1.5 rounded-lg">
                등록
            </button>
        </div>
    </header>

    <main id="content-area">
        <form id="create-quiz-form" novalidate class="divide-y divide-slate-100 dark:divide-slate-700">

            <!-- 게시물 이용안내 버튼 -->
            <div class="px-4 py-3">
                <button type="button" id="guide-btn"
                    class="flex items-center gap-2 w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 text-sm text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600">
                    <i class="fas fa-info-circle text-[#169976]"></i>
                    <span>게시물 이용안내</span>
                    <i class="fas fa-chevron-right text-slate-400 ml-auto text-xs"></i>
                </button>
            </div>

            <!-- Pick 유형 (hidden - URL 파라미터로 자동 설정) -->
            <div class="hidden">
                <input type="radio" name="quiz-type" value="quiz" id="type-quiz">
                <input type="radio" name="quiz-type" value="superquiz" id="type-superquiz">
                <input type="radio" name="quiz-type" value="pix" id="type-pix">
            </div>

            <!-- 카테고리 (hidden - 나중에 살릴 수 있음) -->
            <div class="hidden">
                <select id="quiz-category" name="category">
                    <option value="free" selected>잡담</option>
                </select>
            </div>

            <!-- 제목 -->
            <div class="px-4 py-4">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">제목</p>
                <input type="text" id="quiz-title" name="title" required
                    placeholder="제목을 입력하세요"
                    maxlength="100"
                    class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
            </div>

            <!-- 본문 -->
            <div class="px-4 py-4">
                <div class="flex justify-between mb-2">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide">본문 텍스트 (선택 사항)</p>
                    <span id="description-counter" class="text-xs text-slate-400">0 / 2000</span>
                </div>
                <textarea id="quiz-description" name="description" rows="3"
                    placeholder="내용을 입력하세요"
                    maxlength="2000"
                    class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976] resize-none"></textarea>
            </div>

            <!-- 이미지 업로드 -->
            <div id="post-image-upload-section" class="px-4 py-4 space-y-2">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wide">사진 업로드 (최대 4장)</p>
                <label class="flex items-center gap-2 px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 cursor-pointer text-sm text-slate-500">
                    <i class="fas fa-image text-[#169976]"></i>
                    <span>사진 선택</span>
                    <input type="file" id="image-input" accept="image/*" multiple class="hidden">
                </label>
                <div id="existing-image-preview" class="grid grid-cols-3 gap-2"></div>
                <div id="image-preview" class="grid grid-cols-3 gap-2"></div>
            </div>

            <!-- 픽 설정 (PIX 선택 시만 표시) -->
            <div id="poll-settings" class="hidden px-4 py-4 space-y-4">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wide">픽 설정</p>

                <!-- VS Pick 테마 -->
                <div id="pick-theme-container" class="hidden">
                    <p class="text-xs text-slate-500 mb-1">VS Pick 테마</p>
                    <select id="pick-theme-select" name="theme"
                        class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                        <option value="">테마 선택</option>
                        <option value="yesno">그렇다 / 아니다</option>
                        <option value="updown">Up / Down</option>
                        <option value="winlose">승 / 패</option>
                        <option value="onetwo">1번 / 2번</option>
                        <option value="yyyn">ㅇㅇ / ㄴㄴ</option>
                        <option value="custom">커스텀</option>
                    </select>
                </div>

                <!-- 선택지 -->
                <div id="options-container" class="hidden">
                    <p class="text-xs text-slate-500 mb-1">선택지</p>
                    <div id="options-list" class="space-y-2"></div>
                    <button type="button" id="add-option-btn"
                        class="hidden mt-2 text-sm font-semibold text-[#169976]">+ 선택지 추가</button>
                </div>

                <!-- 종료 기간 -->
                <div>
                    <label class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 cursor-pointer">
                        <input type="checkbox" id="use-duration" class="w-4 h-4 text-[#169976] rounded">
                        <div>
                            <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">종료 기간 설정</p>
                            <p class="text-xs text-slate-400">체크 시 투표 종료 기간을 설정할 수 있어요</p>
                        </div>
                    </label>
                    <div id="duration-input" class="hidden mt-2">
                        <select id="duration-days" name="durationDays"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                            <option value="1">1일</option>
                            <option value="2">2일</option>
                            <option value="3">3일</option>
                            <option value="4">4일</option>
                            <option value="5">5일</option>
                            <option value="6">6일</option>
                            <option value="7">7일</option>
                            <option value="8">8일</option>
                            <option value="9">9일</option>
                            <option value="10">10일</option>
                        </select>
                    </div>
                </div>

                <!-- 참가자 제한 (선택) -->
                <div>
                    <label class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 cursor-pointer">
                        <input type="checkbox" id="use-participant-limit" class="w-4 h-4 text-[#169976] rounded">
                        <div>
                            <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">참가자 제한 설정</p>
                            <p class="text-xs text-slate-400">체크 시 참가 인원을 제한할 수 있어요</p>
                        </div>
                    </label>
                    <div id="participant-limit-input" class="hidden mt-2">
                        <input type="number" id="participant-limit" name="participantLimit"
                            placeholder="참가자 수 입력 (10~500)" min="10" max="500"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                        <p id="participant-limit-msg" class="hidden text-xs text-red-500 mt-1 ml-1">참가자 수를 입력해주세요!</p>
                    </div>
                </div>

                <!-- 무투표 댓글 허용 -->
                <label class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 cursor-pointer">
                    <input type="checkbox" id="allow-no-vote-comment" class="w-4 h-4 text-[#169976] rounded">
                    <div>
                        <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">무투표 댓글 허용</p>
                        <p class="text-xs text-slate-400">체크 시 투표 안 해도 댓글 작성 가능</p>
                    </div>
                </label>
            </div>

        </form>
    </main>
</div>

<!-- 게시물 이용안내 모달 -->
<div id="guide-modal" class="modal-overlay">
    <div class="modal-content">
        <button onclick="document.getElementById('guide-modal').classList.remove('show')"
            class="absolute top-3 right-4 text-slate-400 text-xl">&times;</button>
        <h2 class="text-lg font-bold mb-3">게시물 이용안내</h2>
        <div class="text-sm text-slate-600 dark:text-slate-300 space-y-2">
            <p>• 허위사실, 비방, 욕설이 포함된 게시물은 삭제될 수 있습니다.</p>
            <p>• 저작권 침해 콘텐츠는 게시할 수 없습니다.</p>
            <p>• 도배, 광고성 게시물은 제재 대상입니다.</p>
            <p>• 커뮤니티 규정을 위반할 경우 계정이 정지될 수 있습니다.</p>
            <p class="text-xs text-slate-400 pt-2">※ 이용안내 내용은 추후 업데이트될 수 있습니다.</p>
        </div>
    </div>
</div>

<!-- 옵션 이미지 액션시트 -->
<div id="option-action-sheet">
  <div class="backdrop" id="action-sheet-backdrop"></div>
  <div class="sheet">
    <button class="sheet-btn" id="action-change-image">
      <i class="fas fa-image text-[#169976]"></i> 다른 이미지 선택
    </button>
    <button class="sheet-btn" id="action-adjust-image">
      <i class="fas fa-crop-alt text-[#169976]"></i> 이미지 위치 조정
    </button>
    <button class="sheet-btn danger" id="action-delete-image">
      <i class="fas fa-trash"></i> 이미지 삭제
    </button>
  </div>
</div>

<!-- 크롭 전체화면 UI -->
<div id="crop-screen">
  <div class="crop-header">
    <button id="crop-cancel-btn" style="color:#aaa; font-size:1.3rem;">
      <i class="fas fa-arrow-left"></i>
    </button>
    <span>이미지 위치 조정</span>
    <button class="save-btn" id="crop-save-btn">저장</button>
  </div>
  <div class="crop-area">
    <img id="crop-image" src="" alt="crop">
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="create-post.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const isEditMode = urlParams.get('edit') === 'true';
        if (isEditMode) {
            const titleElement = document.getElementById('page-title');
            if (titleElement) {
                titleElement.textContent = '게시물 수정';
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(savedTheme);

        document.getElementById('guide-btn')?.addEventListener('click', () => {
            document.getElementById('guide-modal').classList.add('show');
        });
        document.getElementById('guide-modal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('guide-modal'))
                document.getElementById('guide-modal').classList.remove('show');
        });
    });
</script>
</body>
</html>
