<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽스 | 마이페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        html.dark body { background-color: #0f172a; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8f7f4; display: flex; flex-direction: column; }
        html.dark #app { background: #1e293b; }
        #top-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        html.dark #top-header { background: #1e293b; border-color: #334155; }
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        #content-area.guest-mode { display: flex; align-items: center; justify-content: center; }
        #bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 50; }
        html.dark #bottom-nav { background: #1e293b; border-color: #334155; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; font-size: 10px; color: #94a3b8; cursor: pointer; text-decoration: none; gap: 3px; }
        .nav-btn.active { color: #263559; }
        .nav-btn i { font-size: 20px; }
        .nav-btn.pick-btn .pick-circle { width: 48px; height: 48px; background: #3ef0cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; box-shadow: 0 4px 12px rgba(22,153,118,0.4); }
        .nav-btn.pick-btn .pick-circle i { font-size: 22px; color: white; }

        /* 탭 스타일 */
        .my-tab-btn { flex: 1; padding: 10px 0; font-size: 12px; font-weight: 600; color: #94a3b8; border-bottom: 2px solid transparent; text-align: center; cursor: pointer; transition: all 0.15s; }
        .my-tab-btn.active { color: #169976; border-color: #169976; }

        /* 로그인 모달은 auth.js에서 동적 주입 */
    </style>
</head>
<body>
<div id="app">

    <!-- 상단 헤더 -->
    <header id="top-header">
        <div class="flex items-center justify-between px-4 py-3">
            <span class="font-bold text-slate-800 dark:text-white text-base">마이페이지</span>
            <button id="logout-link" class="text-sm text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">로그아웃</button>
        </div>
    </header>

    <main id="content-area">

        <!-- 프로필 카드 -->
        <div class="bg-white dark:bg-slate-800 px-4 py-5 flex items-center gap-4">
            <div class="relative flex-shrink-0">
                <img id="profile-image" class="w-16 h-16 rounded-full object-cover border-2 border-slate-200 dark:border-slate-600">
                <button id="change-photo-btn" class="absolute bottom-0 right-0 w-6 h-6 bg-[#169976] rounded-full flex items-center justify-center">
                    <i class="fas fa-camera text-white text-xs"></i>
                </button>
                <input type="file" id="profile-upload" accept="image/*" class="hidden">
            </div>
            <div class="flex-1">
                <p id="profile-name" class="font-bold text-lg text-slate-900 dark:text-white">닉네임</p>
                <p class="text-sm text-slate-500 dark:text-slate-400 hidden">보유 포인트: <span id="profile-points" class="font-bold text-[#169976]">0</span> P</p>
            </div>
        </div>

        <!-- 탭 메뉴 -->
        <div class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex overflow-x-auto scrollbar-hide sticky top-[57px] z-40">
            <button class="my-tab-btn active whitespace-nowrap px-3" data-tab="my-posts">내 글</button>
            <button class="my-tab-btn whitespace-nowrap px-3" data-tab="my-votes">내 투표</button>
            <button class="my-tab-btn whitespace-nowrap px-3" data-tab="my-comments">내 댓글</button>
            <button class="my-tab-btn whitespace-nowrap px-3" data-tab="my-likes">좋아요</button>
            <button class="my-tab-btn whitespace-nowrap px-3 hidden" data-tab="my-points">포인트</button>
            <button class="my-tab-btn whitespace-nowrap px-3" data-tab="change-nickname">프로필 설정</button>
        </div>

        <!-- 탭 콘텐츠 -->
        <div class="px-4 py-4">

            <div id="tab-my-posts" class="tab-content space-y-2"></div>
            <div id="tab-my-votes" class="tab-content hidden space-y-2"></div>
            <div id="tab-my-comments" class="tab-content hidden space-y-2"></div>
            <div id="tab-my-likes" class="tab-content hidden space-y-2"></div>

            <div id="tab-my-points" class="tab-content hidden">
                <div id="my-points-summary" class="p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm text-center">
                    <p class="text-3xl font-bold text-[#169976]">0 P</p>
                    <p class="text-slate-400 text-sm mt-1">현재 보유 포인트</p>
                </div>
            </div>

            <div id="tab-change-nickname" class="tab-content hidden">
                <div class="bg-white dark:bg-slate-800 rounded-xl p-4 space-y-3">
                    <p class="text-sm font-bold text-slate-800 dark:text-white">닉네임 변경</p>
                    <p class="text-xs text-slate-400">1년에 1회만 변경 가능합니다.</p>
                    <input id="new-nickname-input" type="text" maxlength="20" placeholder="새 닉네임 입력"
                        class="w-full px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#169976] dark:bg-slate-700 dark:border-slate-600">
                    <button id="change-nickname-btn" class="w-full py-2 bg-[#169976] text-white rounded-lg text-sm font-bold hover:opacity-90 transition">변경하기</button>
                    <p id="nickname-change-msg" class="text-sm text-center"></p>
                </div>

                <!-- 비밀번호 변경 -->
                <div id="password-change-section" class="hidden bg-white dark:bg-slate-800 rounded-xl p-4 space-y-3 mt-4">
                    <p class="text-sm font-bold text-slate-800 dark:text-white">비밀번호 변경</p>
                    <input id="current-password-input" type="password" placeholder="현재 비밀번호"
                        class="w-full px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#169976] dark:bg-slate-700 dark:border-slate-600">
                    <input id="new-password-input" type="password" placeholder="새 비밀번호 (8자 이상)"
                        class="w-full px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#169976] dark:bg-slate-700 dark:border-slate-600">
                    <input id="confirm-password-input" type="password" placeholder="새 비밀번호 확인"
                        class="w-full px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#169976] dark:bg-slate-700 dark:border-slate-600">
                    <button id="change-password-btn" class="w-full py-2 bg-[#169976] text-white rounded-lg text-sm font-bold hover:opacity-90 transition">변경하기</button>
                    <p id="password-change-msg" class="text-sm text-center"></p>
                </div>

                <!-- 회원 탈퇴 -->
                <div class="mt-4 text-center">
                    <button id="withdraw-link" class="text-xs text-red-400 hover:text-red-600">회원 탈퇴</button>
                </div>

                <!-- 제휴/약관 링크 -->
                <div class="mt-6 flex justify-center gap-6">
                    <a href="partnership.html" class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition">제휴 및 파트너십 문의</a>
                    <a href="terms.html" class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition">이용약관</a>
                </div>
            </div>

        </div>
    </main>

    <!-- 하단 네비게이션 -->
    <nav id="bottom-nav">
        <a href="index.html" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M14,18h-4c-1.103,0-2-.897-2-2v-4c0-1.103,.897-2,2-2h4c1.103,0,2,.897,2,2v4c0,1.103-.897,2-2,2Zm-4-6v4h4.002l-.002-4h-4Zm9,12H5c-2.757,0-5-2.243-5-5V9.724c0-1.665,.824-3.215,2.204-4.145L9.203,.855c1.699-1.146,3.895-1.146,5.594,0l7,4.724c1.379,.93,2.203,2.479,2.203,4.145v9.276c0,2.757-2.243,5-5,5ZM12,1.997c-.584,0-1.168,.172-1.678,.517L3.322,7.237c-.828,.558-1.322,1.487-1.322,2.486v9.276c0,1.654,1.346,3,3,3h14c1.654,0,3-1.346,3-3V9.724c0-.999-.494-1.929-1.321-2.486L13.678,2.514c-.51-.345-1.094-.517-1.678-.517Z"/></svg>
            <span>홈</span>
        </a>
        <a href="explore.html" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12.75 3.03v.568c0 .334.148.65.405.864l1.068.89c.442.369.535 1.01.216 1.49l-.51.766a2.25 2.25 0 0 1-1.161.886l-.143.048a1.107 1.107 0 0 0-.57 1.664a1.108 1.108 0 0 1-.427 1.605L9 13.125l.423 1.059a.956.956 0 0 1-1.652.928l-.679-.906a1.125 1.125 0 0 0-1.906.172L4.5 15.75l-.612.153M12.75 3.031a9 9 0 0 0-8.862 12.872M12.75 3.031a9 9 0 0 1 6.69 14.036m0 0l-.177-.529A2.25 2.25 0 0 0 17.128 15H16.5l-.324-.324a1.453 1.453 0 0 0-2.328.377l-.036.073a1.6 1.6 0 0 1-.982.816l-.99.282c-.55.157-.894.702-.8 1.267l.073.438c.08.474.49.821.97.821c.846 0 1.598.542 1.865 1.345l.215.643m5.276-3.67a9 9 0 0 1-5.276 3.67m0 0a9 9 0 0 1-10.275-4.835M15.75 9c0 .896-.393 1.7-1.016 2.25"/></svg>
            <span>탐색</span>
        </a>
        <button id="pick-btn-trigger" class="nav-btn pick-btn">
            <div class="pick-circle"><i class="fas fa-plus"></i></div>
            <span style="color:#169976; font-size:10px; margin-top:2px;">픽하기</span>
        </button>
        <a href="notification.html" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.857 17.082a24 24 0 0 0 5.454-1.31A8.97 8.97 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.97 8.97 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.3 24.3 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.97 8.97 0 0 1 5.292 3m13.416 0a8.97 8.97 0 0 1 2.168 4.5"/></svg>
            <span>알림</span>
        </a>
        <a href="mypage.html" class="nav-btn active">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 1 1-7.5 0a3.75 3.75 0 0 1 7.5 0M4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.9 17.9 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632"/></svg>
            <span>마이</span>
        </a>
    </nav>
</div>

<!-- 로그인 모달은 auth.js에서 동적 주입 -->

<!-- 글쓰기 바텀시트 -->
<div id="write-sheet-backdrop" class="hidden fixed inset-0 bg-black/40 z-40"></div>
<div id="write-sheet" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white dark:bg-slate-800 rounded-t-2xl z-50 pb-8">
    <div class="w-10 h-1 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mt-3 mb-4"></div>
    <div class="px-4 space-y-2">
        <button id="sheet-post-btn" class="flex items-center gap-4 w-full px-4 py-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
            <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-600 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-pen text-slate-500 dark:text-slate-300"></i>
            </div>
            <div>
                <p class="font-bold text-slate-800 dark:text-white text-sm">POST</p>
                <p class="text-xs text-slate-400">일반 게시글 작성</p>
            </div>
        </button>
        <button id="sheet-pix-btn" class="flex items-center gap-4 w-full px-4 py-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
            <div class="w-10 h-10 rounded-full bg-green-50 dark:bg-green-900/30 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-vote-yea text-[#169976]"></i>
            </div>
            <div>
                <p class="font-bold text-slate-800 dark:text-white text-sm">PIX</p>
                <p class="text-xs text-slate-400">투표가 있는 픽스 게시글</p>
            </div>
        </button>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const trigger = document.getElementById('pick-btn-trigger');
    const backdrop = document.getElementById('write-sheet-backdrop');
    const sheet = document.getElementById('write-sheet');
    function openSheet() { backdrop.classList.remove('hidden'); sheet.classList.remove('hidden'); }
    function closeSheet() { backdrop.classList.add('hidden'); sheet.classList.add('hidden'); }
    trigger?.addEventListener('click', () => { openSheet(); });
    backdrop?.addEventListener('click', closeSheet);
    document.getElementById('sheet-post-btn')?.addEventListener('click', () => { closeSheet(); window.location.href = 'create-post.html?type=post'; });
    document.getElementById('sheet-pix-btn')?.addEventListener('click', () => { closeSheet(); window.location.href = 'create-post.html?type=pix'; });
});
</script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="header.js"></script>
<script type="module" src="profile.js"></script>
</body>
</html>
