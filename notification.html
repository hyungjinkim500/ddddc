<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림 | 픽스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        html.dark body { background-color: #0f172a; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8f7f4; display: flex; flex-direction: column; }
        html.dark #app { background: #1e293b; }
        #top-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        html.dark #top-header { background: #1e293b; border-color: #334155; }
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        #bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 50; }
        html.dark #bottom-nav { background: #1e293b; border-color: #334155; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; font-size: 10px; color: #94a3b8; cursor: pointer; text-decoration: none; gap: 3px; }
        .nav-btn.active { color: #169976; }
        .nav-btn i { font-size: 20px; }
        .nav-btn.pick-btn .pick-circle { width: 48px; height: 48px; background: #169976; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; box-shadow: 0 4px 12px rgba(22,153,118,0.4); }
        .nav-btn.pick-btn .pick-circle i { font-size: 22px; color: white; }
        .notif-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: white; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.12s; text-decoration: none; }
        .notif-item:active { background: #f8fafc; }
        .notif-item.unread { background: #f0fdf9; border-left: 3px solid #169976; }
        html.dark .notif-item { background: #334155; border-color: #475569; }
        html.dark .notif-item.unread { background: #1a3a2e; }
        .notif-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="app">
        <!-- 상단 헤더 -->
        <header id="top-header" class="flex items-center justify-between p-4">
            <h1 class="text-lg font-bold text-slate-800 dark:text-slate-200">알림</h1>
            <div class="flex items-center gap-4">
                <button id="read-all-btn" class="text-sm text-slate-500 dark:text-slate-400">모두 읽음</button>
            </div>
        </header>

        <!-- 알림 목록 -->
        <main id="content-area">
            <div id="notification-list">
                <!-- 스켈레톤 로더 -->
                <div id="loader">
                    <div class="notif-item" style="pointer-events: none;">
                        <div class="skeleton notif-icon"></div>
                        <div class="flex-1">
                            <div class="skeleton h-5 w-4/5 mb-2"></div>
                            <div class="skeleton h-4 w-2/5"></div>
                        </div>
                    </div>
                    <div class="notif-item" style="pointer-events: none;">
                        <div class="skeleton notif-icon"></div>
                        <div class="flex-1">
                            <div class="skeleton h-5 w-3/4 mb-2"></div>
                            <div class="skeleton h-4 w-1/3"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="no-notifications" class="hidden text-center py-20 text-slate-500">
                <i class="far fa-bell fa-2x mb-3"></i>
                <p>새로운 알림이 없습니다.</p>
            </div>
        </main>

        <!-- 하단 네비게이션 -->
        <nav id="bottom-nav">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i><span>홈</span></a>
            <a href="explore.html" class="nav-btn"><i class="fas fa-compass"></i><span>탐색</span></a>
            <button id="pick-btn-trigger" class="nav-btn pick-btn">
                <div class="pick-circle"><i class="fas fa-plus"></i></div>
                <span style="color:#169976;font-size:10px;margin-top:2px;">픽하기</span>
            </button>
            <a href="notification.html" class="nav-btn active"><i class="fas fa-bell"></i><span>알림</span></a>
            <a href="mypage.html" class="nav-btn"><i class="fas fa-user"></i><span>마이</span></a>
        </nav>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, query, orderBy, limit, getDocs, doc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const notificationList = document.getElementById('notification-list');
        const loader = document.getElementById('loader');
        const noNotifications = document.getElementById('no-notifications');
        const readAllBtn = document.getElementById('read-all-btn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadNotifications(user.uid);
            } else {
                loader.style.display = 'none';
                noNotifications.classList.remove('hidden');
                noNotifications.innerHTML = `
                    <i class="far fa-bell-slash fa-2x mb-3"></i>
                    <p>로그인이 필요합니다.</p>
                    <a href="/auth.html" class="mt-4 inline-block bg-sky-500 text-white px-4 py-2 rounded-lg text-sm">로그인</a>
                `;
            }
        });

        async function loadNotifications(uid) {
            loader.style.display = 'block';
            notificationList.innerHTML = '';
            notificationList.appendChild(loader);
            noNotifications.classList.add('hidden');

            try {
                const notificationsRef = collection(db, 'notifications', uid, 'items');
                const q = query(notificationsRef, orderBy('createdAt', 'desc'), limit(30));
                const snapshot = await getDocs(q);

                loader.style.display = 'none';

                if (snapshot.empty) {
                    noNotifications.classList.remove('hidden');
                    return;
                }

                snapshot.docs.forEach(docSnap => {
                    const item = docSnap.data();
                    const el = createNotificationElement(docSnap.id, item);
                    notificationList.appendChild(el);
                });

            } catch (error) {
                console.error("Error loading notifications: ", error);
                loader.style.display = 'none';
                noNotifications.classList.remove('hidden');
                noNotifications.innerHTML = `<p>알림을 불러오는 중 오류가 발생했습니다.</p>`;
            }
        }

        function createNotificationElement(id, item) {
            const el = document.createElement('a');
            el.className = 'notif-item';
            if (!item.read) el.classList.add('unread');
            el.href = `post.html?id=${item.postId}`;
            el.dataset.id = id;

            let iconHtml = '';
            let iconColor = '';
            switch(item.type) {
                case 'vote': iconHtml = '<i class="fas fa-poll-h"></i>'; iconColor = 'bg-blue-100 text-blue-500'; break;
                case 'like': iconHtml = '<i class="fas fa-heart"></i>'; iconColor = 'bg-red-100 text-red-500'; break;
                case 'comment': iconHtml = '<i class="fas fa-comment"></i>'; iconColor = 'bg-green-100 text-green-500'; break;
                case 'reply': iconHtml = '<i class="fas fa-reply"></i>'; iconColor = 'bg-indigo-100 text-indigo-500'; break;
                default: iconHtml = '<i class="fas fa-bell"></i>'; iconColor = 'bg-slate-100 text-slate-500';
            }

            el.innerHTML = `
                <div class="notif-icon ${iconColor}">${iconHtml}</div>
                <div class="flex-1 min-w-0">
                    <p class="text-slate-800 dark:text-slate-200 text-sm leading-snug truncate">${item.message || '새 알림'}</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">${formatTime(item.createdAt)}</p>
                </div>
            `;
            
            el.addEventListener('click', async (e) => {
                e.preventDefault();
                if (!item.read) {
                    markAsRead(auth.currentUser.uid, id);
                    el.classList.remove('unread');
                }
                window.location.href = el.href;
            });
            return el;
        }

        async function markAsRead(uid, notifId) {
            const notifRef = doc(db, 'notifications', uid, 'items', notifId);
            try {
                await updateDoc(notifRef, { read: true });
            } catch (e) {
                console.error("Failed to mark as read:", e);
            }
        }
        
        readAllBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;
            
            const batch = writeBatch(db);
            const unreadItems = document.querySelectorAll('.notif-item.unread');
            if (unreadItems.length === 0) return;

            unreadItems.forEach(el => {
                const notifId = el.dataset.id;
                const notifRef = doc(db, 'notifications', user.uid, 'items', notifId);
                batch.update(notifRef, { "read": true });
            });

            try {
                await batch.commit();
                unreadItems.forEach(el => el.classList.remove('unread'));
            } catch (e) {
                console.error("Failed to mark all as read:", e);
            }
        });

        function formatTime(timestamp) {
            if (!timestamp || !timestamp.toDate) return '';
            const date = timestamp.toDate();
            const diff = Math.floor((new Date() - date) / 1000);
            if (diff < 60) return '방금 전';
            if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
            return `${Math.floor(diff / 86400)}일 전`;
        }
        
        // 테마 적용 (localStorage 기준)
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(savedTheme);

    </script>
</body>
</html>
