<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탐색 | 픽스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
        }
        html.dark body { background-color: #0f172a; }

        #app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f8f7f4;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        html.dark #app { background: #1e293b; }

        /* 상단 헤더 */
        #top-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        html.dark #top-header {
            background: #1e293b;
            border-color: #334155;
        }

        /* 검색바 영역 */
        #search-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
        }
        #explore-search-input {
            flex: 1;
            background: #f1f5f9;
            border: none;
            border-radius: 999px;
            padding: 9px 16px;
            font-size: 14px;
            outline: none;
            color: #1e293b;
            transition: background 0.15s;
        }
        html.dark #explore-search-input {
            background: #334155;
            color: #e2e8f0;
        }
        #explore-search-input::placeholder { color: #94a3b8; }
        #explore-search-input:focus {
            background: #e2e8f0;
        }
        html.dark #explore-search-input:focus {
            background: #475569;
        }
        #explore-search-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #169976;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #explore-search-btn:active { background: #0d7a5f; }

        /* 메인 콘텐츠 */
        #explore-main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* 인기 검색어 태그 */
        .trend-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 999px;
            background: white;
            border: 1.5px solid #e2e8f0;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.15s;
        }
        .trend-tag:hover, .trend-tag:active {
            background: #169976;
            color: white;
            border-color: #169976;
        }
        html.dark .trend-tag {
            background: #334155;
            border-color: #475569;
            color: #94a3b8;
        }
        html.dark .trend-tag:hover {
            background: #169976;
            color: white;
            border-color: #169976;
        }

        /* 검색 결과 영역 */
        #search-results-wrap {
            display: none;
        }
        #search-results-wrap.visible {
            display: block;
        }
        #explore-main-content {
            display: block;
        }
        #explore-main-content.hidden {
            display: none;
        }

        /* 결과 아이템 */
        .result-item {
            display: block;
            border-radius: 12px;
            padding: 12px 14px;
            background: white;
            margin-bottom: 8px;
            text-decoration: none;
            transition: background 0.12s;
            border: 1px solid #e2e8f0;
        }
        .result-item:active { background: #f8fafc; }
        html.dark .result-item {
            background: #334155;
            border-color: #475569;
        }
        html.dark .result-item:active { background: #3d4f66; }

        /* 하단 네비게이션 */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            z-index: 50;
        }
        html.dark #bottom-nav {
            background: #1e293b;
            border-color: #334155;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            font-size: 10px;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: none;
            gap: 3px;
        }
        .nav-btn.active { color: #263559; }
        .nav-btn i { font-size: 20px; }
        .nav-btn.pick-btn { color: white; }
        .nav-btn.pick-btn .pick-circle {
            width: 48px;
            height: 48px;
            background: #3ef0cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 4px 12px rgba(22,153,118,0.4);
        }
        .nav-btn.pick-btn .pick-circle i { font-size: 22px; color: white; }

        /* 페이지네이션 */
        #pagination button {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            background: white;
            color: #475569;
            cursor: pointer;
        }
        html.dark #pagination button {
            background: #334155;
            border-color: #475569;
            color: #94a3b8;
        }
        #pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        #pagination button.active-page {
            background: #169976;
            color: white;
            border-color: #169976;
        }

        /* 섹션 타이틀 */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        html.dark .section-title { color: #e2e8f0; }

        /* 로그인 모달은 auth.js에서 동적 주입 */

        /* 스켈레톤 로딩 */
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 8px;
        }
        html.dark .skeleton {
            background: linear-gradient(90deg, #334155 25%, #3d4f66 50%, #334155 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 필터 select */
        .filter-select {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            background: white;
            color: #475569;
            outline: none;
        }
        html.dark .filter-select {
            background: #334155;
            border-color: #475569;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div id="app">

    <!-- 상단 헤더 -->
    <header id="top-header">
        <div id="search-bar-wrap">
            <input
                type="text"
                id="explore-search-input"
                placeholder="검색어를 입력하세요"
                autocomplete="off"
            >
            <button id="explore-search-btn" aria-label="검색">
                <i class="fas fa-search text-sm"></i>
            </button>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main id="explore-main">

        <!-- 탐색 메인 화면 (검색어 없을 때) -->
        <div id="explore-main-content">

            <!-- 인기 검색어 -->
            <div class="mb-6">
                <p class="section-title"><i class="fas fa-fire text-orange-400"></i> 인기 검색어</p>
                <div id="trending-keywords" class="flex flex-wrap gap-2">
                    <!-- 스켈레톤 -->
                    <div class="skeleton h-8 w-16 rounded-full"></div>
                    <div class="skeleton h-8 w-20 rounded-full"></div>
                    <div class="skeleton h-8 w-14 rounded-full"></div>
                    <div class="skeleton h-8 w-18 rounded-full"></div>
                    <div class="skeleton h-8 w-16 rounded-full"></div>
                </div>
            </div>

        </div>

        <!-- 검색 결과 화면 (검색어 있을 때) -->
        <div id="search-results-wrap">

            <!-- 검색어 표시 + 뒤로가기 -->
            <div class="flex items-center gap-3 mb-4">
                <button id="back-to-explore" class="w-8 h-8 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300">
                    <i class="fas fa-arrow-left text-sm"></i>
                </button>
                <p class="font-bold text-slate-800 dark:text-slate-100 flex-1 truncate">
                    '<span id="search-keyword-display"></span>' 검색 결과
                </p>
                <span id="result-count" class="text-xs text-slate-400 flex-shrink-0"></span>
            </div>

            <!-- 필터 -->
            <div class="flex items-center gap-2 mb-4">
                <select id="filter-sort" class="filter-select">
                    <option value="latest">최신순</option>
                    <option value="popular">인기순</option>
                </select>
                <select id="filter-category" class="filter-select hidden">
                    <option value="">전체 카테고리</option>
                </select>
            </div>

            <!-- 결과 리스트 -->
            <div id="search-results-container"></div>

            <!-- 페이지네이션 -->
            <div id="pagination" class="mt-4 flex justify-center items-center gap-1 flex-wrap"></div>

        </div>

    </main>

    <!-- 하단 네비게이션 -->
    <nav id="bottom-nav">
        <a href="index.html" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M14,18h-4c-1.103,0-2-.897-2-2v-4c0-1.103,.897-2,2-2h4c1.103,0,2,.897,2,2v4c0,1.103-.897,2-2,2Zm-4-6v4h4.002l-.002-4h-4Zm9,12H5c-2.757,0-5-2.243-5-5V9.724c0-1.665,.824-3.215,2.204-4.145L9.203,.855c1.699-1.146,3.895-1.146,5.594,0l7,4.724c1.379,.93,2.203,2.479,2.203,4.145v9.276c0,2.757-2.243,5-5,5ZM12,1.997c-.584,0-1.168,.172-1.678,.517L3.322,7.237c-.828,.558-1.322,1.487-1.322,2.486v9.276c0,1.654,1.346,3,3,3h14c1.654,0,3-1.346,3-3V9.724c0-.999-.494-1.929-1.321-2.486L13.678,2.514c-.51-.345-1.094-.517-1.678-.517Z"/></svg>
            <span>홈</span>
        </a>
        <a href="explore.html" class="nav-btn active">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12.75 3.03v.568c0 .334.148.65.405.864l1.068.89c.442.369.535 1.01.216 1.49l-.51.766a2.25 2.25 0 0 1-1.161.886l-.143.048a1.107 1.107 0 0 0-.57 1.664a1.108 1.108 0 0 1-.427 1.605L9 13.125l.423 1.059a.956.956 0 0 1-1.652.928l-.679-.906a1.125 1.125 0 0 0-1.906.172L4.5 15.75l-.612.153M12.75 3.031a9 9 0 0 0-8.862 12.872M12.75 3.031a9 9 0 0 1 6.69 14.036m0 0l-.177-.529A2.25 2.25 0 0 0 17.128 15H16.5l-.324-.324a1.453 1.453 0 0 0-2.328.377l-.036.073a1.6 1.6 0 0 1-.982.816l-.99.282c-.55.157-.894.702-.8 1.267l.073.438c.08.474.49.821.97.821c.846 0 1.598.542 1.865 1.345l.215.643m5.276-3.67a9 9 0 0 1-5.276 3.67m0 0a9 9 0 0 1-10.275-4.835M15.75 9c0 .896-.393 1.7-1.016 2.25"/></svg>
            <span>탐색</span>
        </a>
        <button id="pick-btn-trigger" class="nav-btn pick-btn">
            <div class="pick-circle">
                <i class="fas fa-plus"></i>
            </div>
            <span style="color:#169976; font-size:10px; margin-top:2px;">픽하기</span>
        </button>
        <a href="notification.html" class="nav-btn" id="nav-alarm">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.857 17.082a24 24 0 0 0 5.454-1.31A8.97 8.97 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.97 8.97 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.3 24.3 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.97 8.97 0 0 1 5.292 3m13.416 0a8.97 8.97 0 0 1 2.168 4.5"/></svg>
            <span>알림</span>
        </a>
        <a href="mypage.html" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 1 1-7.5 0a3.75 3.75 0 0 1 7.5 0M4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.9 17.9 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632"/></svg>
            <span>마이</span>
        </a>
    </nav>

</div>

<!-- 글쓰기 바텀시트 -->
<div id="write-sheet-backdrop" class="hidden fixed inset-0 bg-black/40 z-40"></div>
<div id="write-sheet" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white dark:bg-slate-800 rounded-t-2xl z-50 pb-8">
    <div class="w-10 h-1 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mt-3 mb-4"></div>
    <div class="px-4 space-y-2">
        <button id="sheet-post-btn" class="flex items-center gap-4 w-full px-4 py-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
            <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-600 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-pen text-slate-500 dark:text-slate-300"></i>
            </div>
            <div>
                <p class="font-bold text-slate-800 dark:text-white text-sm">POST</p>
                <p class="text-xs text-slate-400">일반 게시글 작성</p>
            </div>
        </button>
        <button id="sheet-pix-btn" class="flex items-center gap-4 w-full px-4 py-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
            <div class="w-10 h-10 rounded-full bg-green-50 dark:bg-green-900/30 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-vote-yea text-[#169976]"></i>
            </div>
            <div>
                <p class="font-bold text-slate-800 dark:text-white text-sm">PIX</p>
                <p class="text-xs text-slate-400">투표가 있는 픽스 게시글</p>
            </div>
        </button>
    </div>
</div>

<!-- 로그인 모달은 auth.js에서 동적 주입 -->

<!-- 바텀시트 스크립트 -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const trigger = document.getElementById('pick-btn-trigger');
    const backdrop = document.getElementById('write-sheet-backdrop');
    const sheet = document.getElementById('write-sheet');
    function openSheet() { backdrop.classList.remove('hidden'); sheet.classList.remove('hidden'); }
    function closeSheet() { backdrop.classList.add('hidden'); sheet.classList.add('hidden'); }
    trigger?.addEventListener('click', () => {
        const user = window._currentUser;
        if (!user) { document.getElementById('login-modal-button')?.click(); return; }
        openSheet();
    });
    backdrop?.addEventListener('click', closeSheet);
    document.getElementById('sheet-post-btn')?.addEventListener('click', () => { closeSheet(); window.location.href = 'create-post.html?type=post'; });
    document.getElementById('sheet-pix-btn')?.addEventListener('click', () => { closeSheet(); window.location.href = 'create-post.html?type=pix'; });
});
</script>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="explore.js"></script>

</body>
</html>
