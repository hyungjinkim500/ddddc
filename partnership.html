<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽스 | 제휴 및 파트너십 문의</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        html.dark body { background-color: #0f172a; }
        #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8f7f4; display: flex; flex-direction: column; }
        html.dark #app { background: #1e293b; }
        #top-header { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        html.dark #top-header { background: #1e293b; border-color: #334155; }
        #content-area { flex: 1; overflow-y: auto; padding-bottom: 40px; }
    </style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z333VZ22WB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Z333VZ22WB');
</script>
</head>
<body>
<div id="app">

    <header id="top-header">
        <div class="flex items-center justify-between px-4 py-3">
            <button onclick="history.back()" class="text-slate-500 dark:text-slate-400 hover:text-slate-700 transition">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <span class="font-bold text-slate-800 dark:text-white text-sm">제휴 및 파트너십 문의</span>
            <div class="w-8"></div>
        </div>
    </header>

    <main id="content-area" class="px-4 py-6">

        <div class="bg-white dark:bg-slate-800 rounded-xl p-5 mb-4">
            <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                픽스와 함께 성장할 파트너를 찾고 있습니다.<br>
                광고, 제휴, 협업 등 다양한 문의를 남겨주세요.<br>
                빠른 시일 내에 답변 드리겠습니다.
            </p>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-xl p-5 space-y-3">
            <form action="https://formspree.io/f/mlgwzble" method="POST" id="partnership-form">
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide block mb-1">이름 *</label>
                        <input type="text" name="name" required placeholder="이름을 입력하세요"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide block mb-1">사업자명 (선택)</label>
                        <input type="text" name="business_name" placeholder="사업자명을 입력하세요"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide block mb-1">이메일 *</label>
                        <input type="email" name="email" required placeholder="이메일 주소를 입력하세요"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide block mb-1">연락처 (선택)</label>
                        <input type="tel" name="contact" placeholder="연락처를 입력하세요"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976]">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide block mb-1">문의 내용 *</label>
                        <textarea name="message" required rows="5" placeholder="문의 내용을 입력하세요"
                            class="w-full px-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-[#169976] resize-none"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full py-3 bg-[#169976] text-white rounded-xl text-sm font-bold hover:opacity-90 transition mt-2">
                        문의 접수
                    </button>
                    <p id="form-success" class="hidden text-sm text-center text-[#169976] font-semibold pt-1">문의가 접수되었습니다. 감사합니다 😊</p>
                </div>
            </form>
        </div>

    </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.classList.add(savedTheme);

    const form = document.getElementById('partnership-form');
    form?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(form);
        try {
            const res = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            if (res.ok) {
                form.reset();
                document.getElementById('form-success').classList.remove('hidden');
            } else {
                alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
            }
        } catch(e) {
            alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
        }
    });
});
</script>
</body>
</html>
